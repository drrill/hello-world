<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#eeeff0"/>

  <!-- Subtle grid dots for texture -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#DBDBDB"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Name -->
  <text x="600" y="275" text-anchor="middle" font-family="'Manrope', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" fill="#191919" letter-spacing="-1">Michael Rill</text>

  <!-- Pink accent bar -->
  <rect x="525" y="305" width="150" height="4" rx="2" fill="#e91e63"/>

  <!-- URL -->
  <text x="600" y="370" text-anchor="middle" font-family="'Manrope', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="400" fill="#5F5F5F">michaelrill.xyz</text>
</svg>
