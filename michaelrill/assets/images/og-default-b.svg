<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#eeeff0"/>

  <!-- Large monogram -->
  <text x="340" y="380" text-anchor="middle" font-family="'Manrope', 'Helvetica Neue', Arial, sans-serif" font-size="200" font-weight="800" fill="#e91e63" opacity="0.15">MR</text>
  <text x="340" y="380" text-anchor="middle" font-family="'Manrope', 'Helvetica Neue', Arial, sans-serif" font-size="200" font-weight="800" fill="none" stroke="#e91e63" stroke-width="2">MR</text>

  <!-- Vertical divider -->
